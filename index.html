<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoChronos</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.0/nouislider.min.css"/>
</head>
<body>

  <header>
    <h1>GeoChronos</h1>
  </header>

  <main>
    <div id="timeline">
      <div id="slider"></div>
      <p id="rangeDisplay">Loading timeline...</p>
    </div>

    <div id="mapWrapper">
      <div id="mapLegend">
        <h3>Legend</h3>

        <div class="legendItem">
          <span class="legendDot legendDotSingle"></span>
          <span>Single plotted event</span>
        </div>

        <div class="legendItem">
          <span class="legendDot legendDotClusterSmall"></span>
          <span>Small clustered events</span>
        </div>

        <div class="legendItem">
          <span class="legendDot legendDotClusterMedium"></span>
          <span>Medium clustered events</span>
        </div>

        <div class="legendItem">
          <span class="legendDot legendDotClusterLarge"></span>
          <span>Large clustered events</span>
        </div>
      </div>
      
      <div id="map"></div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.0/nouislider.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
